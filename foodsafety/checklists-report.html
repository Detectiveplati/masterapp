<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.style.visibility='hidden'</script><script src="/auth-guard.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Safety Form Report</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #4b5563;
      --line: #cbd5e1;
      --head: #eff6ff;
      --tick: #0f766e;
      --bg: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; color: var(--ink); font-family: Arial, "Microsoft YaHei UI", sans-serif; }
    body { padding: 10mm; }
    .report { width: 100%; }
    .report-head { margin-bottom: 8mm; }
    .company { font-size: 14px; font-weight: 700; text-transform: uppercase; }
    .meta-line { display: flex; justify-content: space-between; gap: 18px; font-size: 12px; margin-top: 3px; }
    .title { font-size: 16px; font-weight: 700; margin-top: 8px; }
    .subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .instructions { border: 1px solid var(--line); padding: 8px 10px; font-size: 10px; line-height: 1.45; margin-top: 8px; }
    .instructions ol { margin: 0; padding-left: 16px; }
    .section-block { margin-top: 7mm; break-inside: avoid; }
    .section-meta { display: flex; justify-content: space-between; gap: 12px; font-size: 11px; margin-bottom: 4px; }
    .section-title { font-weight: 700; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { border: 1px solid var(--line); padding: 4px 3px; font-size: 9px; text-align: center; vertical-align: middle; }
    th.item, td.item { width: 28%; text-align: left; padding-left: 6px; font-weight: 600; }
    thead th { background: var(--head); font-weight: 700; }
    .tick { color: var(--tick); font-weight: 700; font-size: 11px; }
    .remarks-row td { height: 20px; }
    .remarks-label { font-weight: 700; text-align: left; padding-left: 6px; }
    .signature-wrap { margin-top: 10mm; border: 1px solid var(--line); }
    .signature-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .sig-box { min-height: 82px; border-right: 1px solid var(--line); padding: 10px 12px; }
    .sig-box:last-child { border-right: none; }
    .sig-title { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
    .sig-row { display: grid; grid-template-columns: 82px 1fr; gap: 8px; font-size: 10px; margin-bottom: 6px; }
    .sig-value { border-bottom: 1px solid var(--line); min-height: 16px; }
    .log-table th, .log-table td { font-size: 10px; }
    .log-table th { background: var(--head); }
    .log-remarks { margin-top: 8mm; border: 1px solid var(--line); padding: 8px 10px; font-size: 10px; line-height: 1.5; }
    @page { size: A4 landscape; margin: 10mm; }
  </style>
</head>
<body data-module="foodsafetyforms">
  <div class="report" id="reportRoot">Loading report…</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const templateCode = params.get('template') || '';
    const month = params.get('month');
    const unit = params.get('unit');
    const reportLang = params.get('lang') || 'en';
    const REPORT_TEXT = {
      en: {
        loading: 'Loading report…',
        failed: 'Failed to load report',
        item_header: 'Checklist Item',
        remarks: 'Remarks',
        no_entries: 'No entries recorded',
        revision: 'Revision No.:',
        month_year: 'Month / Year:',
        unit: 'Unit:',
        week: 'WEEK',
        day: 'DAY',
        filled_signature: 'Filled By Signature',
        verified_signature: 'Verified By Signature',
        name: 'Name',
        position: 'Position',
        signature: 'Signature',
        date: 'Date',
        fallback_category: 'Food Safety Form'
      },
      zh: {
        loading: '正在加载报告…',
        failed: '加载报告失败',
        item_header: '检查项目',
        remarks: '备注',
        no_entries: '暂无记录',
        revision: '版本号：',
        month_year: '月份 / 年份：',
        unit: '单位：',
        week: '周',
        day: '日',
        filled_signature: '填写人签名',
        verified_signature: '验证人签名',
        name: '姓名',
        position: '职位',
        signature: '签名',
        date: '日期',
        fallback_category: '食品安全表单'
      }
    };
    function rt(key) {
      return (REPORT_TEXT[reportLang] && REPORT_TEXT[reportLang][key]) || REPORT_TEXT.en[key] || key;
    }
    document.title = reportLang === 'zh' ? '食品安全表单报告' : 'Food Safety Form Report';
    document.getElementById('reportRoot').textContent = rt('loading');
    function esc(text) {
      return String(text == null ? '' : text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function monthLabel(monthKey) {
      const [year, monthNo] = monthKey.split('-').map(Number);
      return new Date(year, monthNo - 1, 1).toLocaleString(reportLang === 'zh' ? 'zh-CN' : undefined, { month: 'long', year: 'numeric' });
    }

    function localizedKey(base) {
      return reportLang === 'zh' ? base + 'Zh' : (reportLang === 'ta' ? base + 'Ta' : base);
    }

    function pickLabel(entity, base) {
      if (!entity) return '';
      const key = localizedKey(base);
      return entity[key] || entity[base] || '';
    }

    function renderSection(section, state, count, label) {
      let html = '<div class="section-block">';
      html += '<div class="section-meta"><div class="section-title">' + esc(pickLabel(section, 'title') || section.title || '') + '</div><div>' + esc(label) + '</div></div>';
      html += '<table><thead><tr><th class="item">' + esc(rt('item_header')) + '</th>';
      for (let i = 0; i < count; i++) html += '<th>' + (i + 1) + '</th>';
      html += '</tr></thead><tbody>';
      section.items.forEach((item) => {
        html += '<tr><td class="item">' + esc(pickLabel(item, 'label') || item.label || '') + '</td>';
        const values = (state.checks && state.checks[item.id]) || [];
        for (let i = 0; i < count; i++) html += '<td>' + (values[i] ? '<span class="tick">✓</span>' : '') + '</td>';
        html += '</tr>';
      });
      html += '<tr class="remarks-row"><td class="remarks-label">' + esc(rt('remarks')) + '</td><td colspan="' + count + '">' + esc(state.remarks || '') + '</td></tr>';
      html += '</tbody></table></div>';
      return html;
    }

    function renderLogTable(template, record) {
      const fields = template.fields || [];
      const entries = (record.data && record.data.entries) || [];
      const footerFields = template.footerFields || [];
      const footer = (record.data && record.data.footer) || {};
      let html = '<div class="section-block"><table class="log-table"><thead><tr>';
      fields.forEach((field) => { html += '<th>' + esc(pickLabel(field, 'label') || field.label || '') + '</th>'; });
      html += '</tr></thead><tbody>';
      if (!entries.length) {
        html += '<tr><td colspan="' + fields.length + '" style="text-align:center;">' + esc(rt('no_entries')) + '</td></tr>';
      } else {
        entries.forEach((entry) => {
          html += '<tr>';
          fields.forEach((field) => {
            let value = entry[field.id];
            if (field.type === 'yes_no') value = value === 'Y' ? 'Y' : (value === 'N' ? 'N' : '');
            if (field.type === 'pass_fail') value = value === 'P' ? 'P' : (value === 'F' ? 'F' : '');
            html += '<td>' + esc(value == null ? '' : value) + '</td>';
          });
          html += '</tr>';
        });
      }
      html += '</tbody></table></div>';
      if (footerFields.length) {
        html += '<div class="log-remarks">';
        html += footerFields.map((field) => '<strong>' + esc(pickLabel(field, 'label') || field.label || '') + ':</strong> ' + esc(footer[field.id] || '')).join('<br>');
        html += '</div>';
      }
      return html;
    }

    function renderSignatureValue(signature) {
      if (signature && signature.signatureDataUrl) {
        return '<img src="' + esc(signature.signatureDataUrl) + '" alt="Signature" style="max-height:34px;max-width:100%;display:block;">';
      }
      return esc((signature && (signature.typedSignature || signature.name)) || '');
    }

    async function load() {
      const res = await fetch('/api/foodsafety-checklists/month/report?template=' + encodeURIComponent(templateCode) + '&month=' + encodeURIComponent(month) + '&unit=' + encodeURIComponent(unit), { credentials: 'include' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || rt('failed'));
      const t = data.template;
      const r = data.record;
      const reportUnit = (t.unitOptions || []).find((item) => item.code === r.unitCode);
      let html = '<div class="report-head">';
      html += '<div class="company">CHILLI API CATERING PTE LTD</div>';
      html += '<div class="meta-line"><div>' + esc(pickLabel(t, 'category') || t.category || rt('fallback_category')) + '</div><div>' + esc(t.code) + '</div></div>';
      html += '<div class="meta-line"><div class="title">' + esc(pickLabel(t, 'title') || t.title || '') + '</div><div>' + esc(rt('revision')) + ' ' + esc(t.revision) + '</div></div>';
      html += '<div class="subtitle">' + esc(rt('month_year')) + ' ' + esc(monthLabel(r.monthKey)) + ' &nbsp; | &nbsp; ' + esc(rt('unit')) + ' ' + esc(pickLabel(reportUnit, 'label') || r.unitLabel) + '</div>';
      const instructions = reportLang === 'zh' && t.instructionsZh && t.instructionsZh.length
        ? t.instructionsZh
        : (reportLang === 'ta' && t.instructionsTa && t.instructionsTa.length ? t.instructionsTa : (t.instructions || []));
      html += '<div class="instructions"><ol>' + instructions.map((x) => '<li>' + esc(x) + '</li>').join('') + '</ol></div>';
      html += '</div>';
      if (t.formType === 'log_entries') {
        html += renderLogTable(t, r);
      } else {
        t.sections.forEach((section) => {
          const count = section.frequency === 'weekly' ? t.weekCount : t.dayCount;
          const label = section.frequency === 'weekly' ? rt('week') : rt('day');
          html += renderSection(section, r.data[section.id] || { checks: {}, remarks: '' }, count, label);
        });
      }
      const finalization = r.finalization || {};
      const verification = r.verification || {};
      html += '<div class="signature-wrap"><div class="signature-grid">';
      html += '<div class="sig-box"><div class="sig-title">' + esc(rt('filled_signature')) + '</div>';
      html += '<div class="sig-row"><div>' + esc(rt('name')) + '</div><div class="sig-value">' + esc(finalization.name || '') + '</div></div>';
      html += '<div class="sig-row"><div>' + esc(rt('position')) + '</div><div class="sig-value">' + esc(finalization.position || '') + '</div></div>';
      html += '<div class="sig-row"><div>' + esc(rt('signature')) + '</div><div class="sig-value">' + renderSignatureValue(finalization) + '</div></div>';
      html += '<div class="sig-row"><div>' + esc(rt('date')) + '</div><div class="sig-value">' + esc(finalization.at ? new Date(finalization.at).toLocaleString() : '') + '</div></div></div>';
      html += '<div class="sig-box"><div class="sig-title">' + esc(rt('verified_signature')) + '</div>';
      html += '<div class="sig-row"><div>' + esc(rt('name')) + '</div><div class="sig-value">' + esc(verification.name || '') + '</div></div>';
      html += '<div class="sig-row"><div>' + esc(rt('position')) + '</div><div class="sig-value">' + esc(verification.position || '') + '</div></div>';
      html += '<div class="sig-row"><div>' + esc(rt('signature')) + '</div><div class="sig-value">' + renderSignatureValue(verification) + '</div></div>';
      html += '<div class="sig-row"><div>' + esc(rt('date')) + '</div><div class="sig-value">' + esc(verification.at ? new Date(verification.at).toLocaleString() : '') + '</div></div></div>';
      html += '</div></div>';
      document.getElementById('reportRoot').innerHTML = html;
      window.__reportReady = true;
    }

    load().catch((err) => {
      document.getElementById('reportRoot').innerHTML = '<div style="color:#b91c1c;font-family:Arial,sans-serif;">' + esc(err.message || rt('failed')) + '</div>';
      window.__reportReady = true;
    });
  </script>
</body>
</html>
