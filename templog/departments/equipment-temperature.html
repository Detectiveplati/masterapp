<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/tempmon/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Temperatures Moved</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fa;
      color: #17212b;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .card {
      width: min(92vw, 620px);
      background: #fff;
      border: 1px solid #dde5ee;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
      padding: 24px;
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 1.4rem; }
    p { margin: 0 0 12px; color: #5a616c; line-height: 1.5; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 8px;
      background: #2f6fed;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body data-module="templog">
  <div class="card">
    <h1>Equipment temperatures moved to Temp Monitor</h1>
    <p>The legacy TempLog equipment-temperature screen has been retired. Monitoring, alerts, history, and monthly ISO exports are now managed only in Temp Monitor.</p>
    <a href="/tempmon/">Open Temp Monitor</a>
  </div>
</body>
</html>
