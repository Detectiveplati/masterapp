<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.style.visibility='hidden'</script><script src="/auth-guard.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Temp Monitor — Central Kitchen</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/lib/dom.js"></script>
  <script src="/js/lib/http.js"></script>
  <script src="/js/lib/tz.js"></script>
  <style>
    main { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .page-header h1 { font-size: 1.4rem; font-weight: 900; color: var(--ink); margin: 0; }
    .nav-links { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
    .nav-link { padding: 8px 14px; border-radius: 8px; background: #f0f0f0; color: var(--muted); font-size: 0.82rem; font-weight: 700; text-decoration: none; transition: background .15s; }
    .nav-link:hover { background: #e0e0e0; color: var(--ink); }
    .nav-link.active { background: var(--accent); color: #fff; }
    /* Summary bar */
    .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; box-shadow: 0 3px 12px var(--shadow); }
    .stat-card .val { font-size: 2rem; font-weight: 900; color: var(--accent); }
    .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card.danger .val { color: #c62828; }
    .stat-card.warn   .val { color: #e65100; }
    .stat-card.ok     .val { color: #2e7d32; }
    /* Units grid */
    .units-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    @media (max-width: 768px) { .units-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .units-grid { grid-template-columns: 1fr; } }
    .unit-card { background: linear-gradient(180deg, var(--card), #fffbf9); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 2px 6px var(--shadow); padding: 20px 18px; cursor: pointer; transition: box-shadow .15s, border-color .15s; text-decoration: none; color: inherit; display: block; }
    .unit-card:hover { box-shadow: 0 4px 18px var(--shadow); border-color: var(--accent); }
    .unit-card.in-range  { border-left: 4px solid #2e7d32; }
    .unit-card.warning   { border-left: 4px solid #e65100; }
    .unit-card.critical  { border-left: 4px solid #c62828; }
    .unit-card.offline   { border-left: 4px solid #9e9e9e; opacity: .75; }
    .unit-card.no-reading { border-left: 4px solid #bdbdbd; }
    .unit-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .unit-icon { font-size: 1.8rem; }
    .unit-name { font-size: 1rem; font-weight: 800; color: var(--ink); }
    .unit-location { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .unit-temp { font-size: 2.6rem; font-weight: 900; line-height: 1; margin: 8px 0 4px; }
    .temp-in-range  { color: #2e7d32; }
    .temp-warning   { color: #e65100; }
    .temp-critical  { color: #c62828; }
    .temp-offline   { color: #9e9e9e; }
    .temp-nodata    { color: #bdbdbd; }
    .unit-limits { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
    .unit-minmax { display: flex; gap: 10px; font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
    .unit-minmax span { background: #f5f5f5; border-radius: 4px; padding: 2px 7px; font-weight: 600; }
    .unit-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.76rem; color: var(--muted); }
    .unit-alert-badge { background: rgba(198,40,40,.1); color: #c62828; border-radius: 20px; padding: 2px 9px; font-weight: 700; font-size: 0.72rem; }
    .battery { display: inline-flex; align-items: center; gap: 3px; }
    .unit-card.not-in-use { opacity: .65; border-left: 4px solid #ffb300; }
    .unit-paused-badge { background:#fff8e1;color:#e65100;border-radius:12px;padding:2px 8px;font-weight:700;font-size:0.7rem;border:1px solid #ffe082; }
    /* Type badges */
    .type-badge { display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px; }
    .type-freezer { background:rgba(21,101,192,.12);color:#1565c0; }
    .type-chiller { background:rgba(2,136,209,.11);color:#0277bd; }
    .type-warmer  { background:rgba(230,81,0,.12);color:#e65100; }
    .type-ambient { background:rgba(85,139,47,.10);color:#558b2f; }
    /* Warmer state pill (dashboard cards) */
    .ws-pill { display:inline-flex;align-items:center;gap:4px;font-size:0.74rem;font-weight:800;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px; }
    .ws-pill.off        { background:#f0f0f0;color:#757575; }
    .ws-pill.warming_up { background:rgba(245,124,0,.13);color:#e65100; }
    .ws-pill.active     { background:rgba(46,125,50,.12);color:#2e7d32; }
    .ws-pill.cooling    { background:rgba(21,101,192,.10);color:#1565c0; }
    .ws-pill.fault      { background:rgba(198,40,40,.12);color:#c62828;animation:ws-fault-pulse 1.4s ease-in-out infinite; }
    .ws-pill.unknown    { background:#f5f5f5;color:#bdbdbd; }
    @keyframes ws-fault-pulse { 0%,100%{opacity:1}50%{opacity:.5} }
    .no-data { text-align: center; padding: 60px; color: var(--muted); font-style: italic; grid-column: 1/-1; }
    .refresh-info { font-size: 0.78rem; color: var(--muted); }
    .group-header { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 22px 0 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .filter-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .filter-bar input[type=search] { flex: 1 1 160px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; background: var(--bg, #fff); color: var(--ink); outline: none; }
    .filter-bar input[type=search]:focus { border-color: var(--accent); }
    .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 11px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 0.78rem; font-weight: 700; cursor: pointer; color: var(--muted); transition: all .15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn.f-critical.active { background: #c62828; border-color: #c62828; }
    .filter-btn.f-warning.active  { background: #e65100; border-color: #e65100; }
    .filter-btn.f-ok.active       { background: #2e7d32; border-color: #2e7d32; }
    .filter-btn.f-offline.active  { background: #757575; border-color: #757575; }
    .filter-btn.f-freezer.active { background: #1565c0; border-color: #1565c0; }
    .filter-btn.f-chiller.active { background: #0288d1; border-color: #0288d1; }
    .filter-btn.f-warmer.active  { background: #e65100; border-color: #e65100; }
    .filter-btn.f-ambient.active { background: #558b2f; border-color: #558b2f; }
    .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; width: 100%; }
    .filter-row-lbl { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); white-space: nowrap; min-width: 50px; }
    .filter-divider { width: 100%; height: 1px; background: var(--border); margin: 4px 0; }
    .filter-btn.f-group.active { background: #546e7a; border-color: #546e7a; color: #fff; }
    .filter-count { margin-left: auto; font-size: 0.76rem; color: var(--muted); white-space: nowrap; }
    @media (max-width: 600px) { main { padding: 16px; } .unit-temp { font-size: 2rem; } .filter-bar { gap: 6px; } }
  </style>
</head>
<body data-module="tempmon">
<main>
  <div class="page-header">
    <h1>🌡️ Equipment Temp Monitor</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="liveDot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#bdbdbd;transition:background .4s"></span>
      <span class="refresh-info" id="lastRefresh">Loading…</span>
    </div>
  </div>

  <div class="nav-links">
    <a href="/tempmon/" class="nav-link active">📡 Live Dashboard</a>
    <a href="/tempmon/alerts.html" class="nav-link">🔴 Alerts</a>
    <a href="/tempmon/report.html" class="nav-link">🧾 Monthly Report</a>
    <a href="/tempmon/setup.html" class="nav-link">⚙️ Setup</a>
    <a href="/tempmon/setup.html?tab=gateway" class="nav-link">📶 LoRa Gateway</a>
    <a href="/tempmon/gateway-log.html" class="nav-link">🪵 Raw Log</a>
    <a href="/tempmon/dev-test.html" class="nav-link">🧪 Dev Test</a>
  </div>

  <div class="filter-bar" style="flex-direction:column;align-items:stretch;gap:8px">
    <div class="filter-row">
      <span class="filter-row-lbl">Status</span>
      <div class="filter-group" id="statusFilters">
        <button class="filter-btn active" data-status="all"        onclick="setStatus('all')">All</button>
        <button class="filter-btn f-critical" data-status="critical"  onclick="setStatus('critical')">🔴 Critical</button>
        <button class="filter-btn f-warning"  data-status="warning"   onclick="setStatus('warning')">🟡 Warning</button>
        <button class="filter-btn f-ok"       data-status="in-range"  onclick="setStatus('in-range')">🟢 OK</button>
        <button class="filter-btn f-offline"  data-status="offline"   onclick="setStatus('offline')">⬛ Offline</button>
        <button class="filter-btn"            data-status="no-reading" onclick="setStatus('no-reading')">— No Data</button>
        <button class="filter-btn"            data-status="paused"    onclick="setStatus('paused')">⏸️ Not In Use</button>
      </div>
      <input type="search" id="filterText" placeholder="🔍 Search…" oninput="applyFilters()" style="margin-left:auto;flex:0 1 180px;padding:6px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:0.82rem">
    </div>
    <div class="filter-divider"></div>
    <div class="filter-row">
      <span class="filter-row-lbl">Type</span>
      <div class="filter-group" id="typeFilters">
        <button class="filter-btn active" data-type="all"     onclick="setType('all')">All</button>
        <button class="filter-btn f-freezer" data-type="freezer" onclick="setType('freezer')">🧊 Freezer</button>
        <button class="filter-btn f-chiller" data-type="chiller" onclick="setType('chiller')">❄️ Chiller</button>
        <button class="filter-btn f-warmer"  data-type="warmer"  onclick="setType('warmer')">🔥 Warmer</button>
        <button class="filter-btn f-ambient" data-type="ambient" onclick="setType('ambient')">🌡️ Ambient</button>
      </div>
      <select id="filterLocation" onchange="applyFilters()" style="margin-left:auto;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.8rem;font-weight:700;color:var(--muted);background:transparent;cursor:pointer">
        <option value="all">All Locations</option>
      </select>
      <div style="display:flex;align-items:center;gap:4px;margin-left:10px">
        <span style="font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Group</span>
        <button class="filter-btn f-group"        id="grpType" onclick="setGroup('type')">Type</button>
        <button class="filter-btn f-group active"   id="grpLoc"  onclick="setGroup('location')">Location</button>
      </div>
      <span class="filter-count" id="filterCount"></span>
    </div>
  </div>

  <div class="summary-bar">
    <div class="stat-card ok">   <div class="val" id="statTotal">—</div><div class="lbl">Total Equipment</div></div>
    <div class="stat-card ok">   <div class="val" id="statInRange">—</div><div class="lbl">In Range</div></div>
    <div class="stat-card danger"><div class="val" id="statOutRange">—</div><div class="lbl">Out of Range</div></div>
    <div class="stat-card warn">  <div class="val" id="statAlerts">—</div><div class="lbl">Open Alerts</div></div>
    <div class="stat-card warn">  <div class="val" id="statOffline">—</div><div class="lbl">Offline Devices</div></div>
  </div>

  <div id="unitsGrid">
    <div class="units-grid"><div class="no-data">Loading…</div></div>
  </div>
</main>

<script>
  const API = '/api/tempmon';
  let refreshTimer = null;
  let currentUser  = null;
  let allUnits     = [];
  let activeStatus = 'all';
  let activeType   = 'all';
  let activeGroup  = 'location'; // 'type' | 'location'

  function setGroup(g) {
    activeGroup = g;
    document.getElementById('grpType').classList.toggle('active', g === 'type');
    document.getElementById('grpLoc').classList.toggle('active',  g === 'location');
    applyFilters();
  }

  function setType(t) {
    activeType = t;
    document.querySelectorAll('#typeFilters .filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.type === t));
    applyFilters();
  }

  async function init() {
    try {
      const r = await apiFetch('/api/auth/me');
      const { user } = await r.json();
      if (!user.permissions?.tempmon && user.role !== 'admin')
        return window.location.replace('/?access=denied');
      currentUser = user;
      document.documentElement.style.visibility = '';
      load();
      refreshTimer = setInterval(load, 30000);
    } catch { window.location.replace('/login'); }
  }

  const TYPE_ICONS   = { freezer: '🧊', chiller: '❄️', warmer: '🔥', ambient: '🌡️' };
  const TYPE_LABELS  = { freezer: 'Freezer', chiller: 'Chiller', warmer: 'Warmer', ambient: 'Ambient' };

  function setStatus(s) {
    activeStatus = s;
    document.querySelectorAll('#statusFilters .filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.status === s));
    applyFilters();
  }

  function applyFilters() {
    if (!allUnits.length) return;
    const text      = (document.getElementById('filterText')?.value || '').toLowerCase().trim();
    const typeVal   = activeType;
    const locVal    = document.getElementById('filterLocation')?.value || 'all';

    const filtered = allUnits.filter(u => {
      const cls = u.latestReading ? tempClass(u, u.latestReading) : (u.openAlerts ? 'critical' : 'no-reading');
      const isPaused = u.inUse === false;
      if (activeStatus === 'paused') { if (!isPaused) return false; }
      else if (activeStatus !== 'all') {
        if (isPaused) return false; // paused units only show under 'all' or 'paused'
        if (cls !== activeStatus) return false;
      }
      if (typeVal !== 'all' && u.type !== typeVal) return false;
      if (locVal  !== 'all') {
        const uLoc = (u.area || u.location || '').trim() || 'Uncategorized';
        if (uLoc !== locVal) return false;
      }
      if (text) {
        const haystack = [(u.name||''), (u.location||''), (u.area||''), (u.type||'')].join(' ').toLowerCase();
        if (!haystack.includes(text)) return false;
      }
      return true;
    });

    const countEl = document.getElementById('filterCount');
    if (countEl) countEl.textContent = filtered.length === allUnits.length
      ? '' : `${filtered.length} of ${allUnits.length} shown`;

    if (!filtered.length) {
      document.getElementById('unitsGrid').innerHTML = '<div class="units-grid"><div class="no-data">No equipment match the current filters.</div></div>';
      return;
    }

    // When a specific type is selected, grouping by type would be pointless — fall back to location
    const groupBy = (activeGroup === 'type' && activeType === 'all') ? 'type' : 'location';

    const TYPE_ORDER  = ['freezer', 'chiller', 'warmer', 'ambient'];
    const TYPE_LABELS = { freezer: '🧊 Freezer', chiller: '❄️ Chiller', warmer: '🔥 Warmer', ambient: '🌡️ Ambient' };

    const groups = {};
    filtered.forEach(u => {
      const key = groupBy === 'type'
        ? (u.type || 'other')
        : ((u.area || u.location || '').trim() || 'Uncategorized');
      (groups[key] = groups[key] || []).push(u);
    });

    const order = groupBy === 'type'
      ? TYPE_ORDER.filter(t => groups[t])
      : Object.keys(groups).sort((a, b) => {
          if (a === 'Uncategorized') return 1;
          if (b === 'Uncategorized') return -1;
          return a.localeCompare(b);
        });

    let html = '';
    for (const key of order) {
      const list = groups[key];
      if (!list) continue;
      const label = groupBy === 'type' ? (TYPE_LABELS[key] || key) : escHtml(key);
      const critCount = list.filter(u => tempClass(u, u.latestReading) === 'critical').length;
      const badge = critCount ? `<span style="color:#c62828;font-weight:700;font-size:0.72rem">${critCount} critical</span>` : '';
      html += `<div class="group-header"><span>${label} <span style="font-weight:400;font-size:0.74rem">(${list.length})</span></span>${badge}</div>`;
      html += `<div class="units-grid">${list.map(renderCard).join('')}</div>`;
    }
    document.getElementById('unitsGrid').innerHTML = html;
  }

  function tempClass(unit, reading) {
    if (!reading) return 'no-reading';
    const v = reading.value;
    // Out of bounds entirely → critical; flagged by server → critical
    if (reading.flagged || v < unit.criticalMin || v > unit.criticalMax) return 'critical';
    const buf = unit.warningBuffer || 2;
    if (v < unit.criticalMin + buf || v > unit.criticalMax - buf) return 'warning';
    return 'in-range';
  }

  function tempTextClass(cls) {
    return { 'in-range': 'temp-in-range', 'warning': 'temp-warning', 'critical': 'temp-critical', 'offline': 'temp-offline', 'no-reading': 'temp-nodata' }[cls] || 'temp-nodata';
  }

  function relativeTime(date) {
    if (!date) return 'never';
    const diff = Math.round((Date.now() - new Date(date)) / 1000);
    if (diff < 60)   return diff + 's ago';
    if (diff < 3600) return Math.round(diff / 60) + 'm ago';
    if (diff < 86400)return Math.round(diff / 3600) + 'h ago';
    return Math.round(diff / 86400) + 'd ago';
  }

  function renderWarmerStatePill(u) {
    const ws = u.warmerState || {};
    const s  = ws.state || 'unknown';
    const labels = { off:'⬜ Off', warming_up:'🌡️ Warming Up', active:'✅ Active', cooling:'❄️ Cooling', fault:'⚠️ Fault', unknown:'— Unknown' };
    return `<div><span class="ws-pill ${s}">${labels[s] || s}</span></div>`;
  }

  function renderCard(u) {
    const paused    = u.inUse === false;
    const r         = u.latestReading;
    const cls       = paused ? 'not-in-use' : (r ? tempClass(u, r) : (u.openAlerts ? 'critical' : 'no-reading'));
    const tCls      = paused ? 'temp-nodata' : tempTextClass(cls);
    const tempStr   = r ? r.value.toFixed(1) + '\u00b0C' : '\u2014';
    const icon      = TYPE_ICONS[u.type] || '🌡️';
    const typeLabel = TYPE_LABELS[u.type] || u.type;
    const alertBadge = !paused && u.openAlerts > 0
      ? `<span class="unit-alert-badge">⚠️ ${u.openAlerts} alert${u.openAlerts > 1 ? 's' : ''}</span>`
      : (paused ? `<span class="unit-paused-badge">⏸ Not in use</span>` : '');
    const pauseComment = paused && u.inUseComment ? `<div style="font-size:0.75rem;color:#e65100;margin-top:4px;font-style:italic">${escHtml(u.inUseComment)}</div>` : '';
    return `
      <a class="unit-card ${escHtml(cls)}" href="/tempmon/unit.html?id=${escHtml(String(u._id))}">
        <div class="unit-top">
          <div>
            <span class="type-badge type-${escHtml(u.type)}">${icon} ${escHtml(typeLabel)}</span>
            <div class="unit-name">${escHtml(u.name)}</div>
            ${u.location ? `<div class="unit-location">${escHtml(u.location)}</div>` : ''}
          </div>
          ${alertBadge}
        </div>
        <div class="unit-temp ${tCls}">${paused ? '\u2014' : tempStr}</div>
        ${u.type === 'warmer' ? renderWarmerStatePill(u) : ''}
        ${pauseComment}
        <div class="unit-limits">Range: ${u.criticalMin}°C – ${u.criticalMax}°C</div>
        <div class="unit-meta">
          ${r ? `<span>🕐 ${relativeTime(r.recordedAt)}</span>` : '<span style="color:#bbb">Awaiting data</span>'}
        </div>
      </a>`;
  }

  async function load() {
    try {
      const [unitsRes, dashRes] = await Promise.all([
        apiFetch(API + '/units'),
        apiFetch(API + '/dashboard')
      ]);
      const units = await unitsRes.json();
      const dash  = await dashRes.json();

      // Live pulse indicator on successful fetch
      const dot = document.getElementById('liveDot');
      if (dot) { dot.style.background = '#4caf50'; setTimeout(() => { dot.style.background = '#bdbdbd'; }, 1500); }

      // Summary bar
      document.getElementById('statTotal').textContent    = dash.totalUnits;
      document.getElementById('statAlerts').textContent   = dash.openAlerts;
      document.getElementById('statOffline').textContent  = dash.offlineDevices;
      document.getElementById('statOutRange').textContent = dash.unitsOutOfRange;
      document.getElementById('statInRange').textContent  = Math.max(0, dash.totalUnits - dash.unitsOutOfRange);
      document.getElementById('lastRefresh').textContent  = 'Updated ' + relativeTime(new Date());

      if (!units.length) {
        document.getElementById('unitsGrid').innerHTML = '<div class="units-grid"><div class="no-data">No equipment configured yet.<br><a href="/tempmon/setup.html" style="color:var(--accent);font-weight:700">⚙️ Add your first equipment →</a></div></div>';
        return;
      }

      allUnits = units;
      // Rebuild location dropdown from current unit data
      const locSel = document.getElementById('filterLocation');
      if (locSel) {
        const prevLoc = locSel.value;
        const locs = [...new Set(units.map(u => (u.area || u.location || '').trim() || 'Uncategorized'))].sort((a,b) => {
          if (a === 'Uncategorized') return 1; if (b === 'Uncategorized') return -1; return a.localeCompare(b);
        });
        locSel.innerHTML = '<option value="all">All Locations</option>' + locs.map(l => `<option value="${escHtml(l)}"${l === prevLoc ? ' selected' : ''}>${escHtml(l)}</option>`).join('');
      }
      applyFilters();
    } catch (err) {
      console.error(err);
      document.getElementById('unitsGrid').innerHTML =
        `<div class="units-grid"><div class="no-data" style="color:#c62828">❌ Failed to load dashboard: ${escHtml(err.message)}<br><small>Check browser console for details.</small></div></div>`;
    }
  }

  init();
</script>
<script src="/js/shell.js"></script>
</body>
</html>
