<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Connection — Central Kitchen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Bahnschrift","Trebuchet MS","Segoe UI",sans-serif;
      background: #f4f5f7; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(18,19,22,0.10);
      padding: 48px 40px; text-align: center;
      max-width: 420px; width: 100%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; color: #121316; margin-bottom: 10px; }
    p  { font-size: 0.95rem; color: #5a616c; line-height: 1.6; margin-bottom: 28px; }
    button {
      padding: 11px 28px; border: none; border-radius: 10px; cursor: pointer;
      font-size: 0.92rem; font-weight: 700; font-family: inherit;
      background: linear-gradient(135deg, #ff7a18, #e65c00);
      color: #fff; box-shadow: 0 4px 12px rgba(255,122,24,0.3);
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Central Kitchen couldn't connect to the server. Check your Wi-Fi or mobile data, then try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
