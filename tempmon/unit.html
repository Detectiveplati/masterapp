<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.style.visibility='hidden'</script><script src="/auth-guard.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Unit Detail — Temp Monitor</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/lib/dom.js"></script>
  <script src="/js/lib/http.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-weight: 700; font-size: 0.88rem; text-decoration: none; margin-bottom: 18px; }
    .back-link:hover { text-decoration: underline; }
    .page-title { font-size: 1.5rem; font-weight: 900; color: var(--ink); margin: 0 0 4px; }
    .page-sub   { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
    .section-card { background: linear-gradient(180deg, var(--card), #fffbf9); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 2px 6px var(--shadow); padding: 22px 24px; margin-bottom: 22px; }
    .section-card h2 { font-size: 1rem; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    /* Date controls */
    .date-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .date-controls label { font-size: 0.82rem; font-weight: 700; color: var(--ink); }
    .date-controls input[type=date] { padding: 7px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; font-family: inherit; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2, #27ae60)); color: #fff; }
    .btn-outline { background: #fff; border: 2px solid var(--accent); color: var(--accent); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    /* Current temp */
    .current-temp-row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; margin-bottom: 18px; }
    .current-val { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .temp-in-range { color: #2e7d32; } .temp-warning { color: #e65100; } .temp-critical { color: #c62828; } .temp-nodata { color: #bdbdbd; }
    .current-lbl { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .limits-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    .limit-badge { font-size: 0.82rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
    .limit-badge.min  { background: rgba(21,101,192,.1);  color: #1565c0; }
    .limit-badge.max  { background: rgba(198,40,40,.1);   color: #c62828; }
    .limit-badge.tgt  { background: rgba(46,125,50,.1);   color: #2e7d32; }
    /* Chart */
    .chart-wrap { position: relative; height: 280px; }
    /* Readings table */
    .readings-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .readings-table th { padding: 9px 12px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 2px solid var(--border); text-align: left; font-weight: 800; }
    .readings-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--ink); }
    .readings-table tr:last-child td { border-bottom: none; }
    .flagged-row td { background: rgba(198,40,40,.04); }
    .flag { color: #c62828; font-weight: 700; font-size: 0.75rem; }
    .sample-tag { color: #9e9e9e; font-size: 0.72rem; }
    /* Alert rows */
    .alerts-list { display: flex; flex-direction: column; gap: 8px; }
    .alert-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; background: #fafafa; }
    .alert-item.open   { border-left: 4px solid #c62828; }
    .alert-item.acked  { border-left: 4px solid #e65100; }
    .alert-item.done   { border-left: 4px solid #bdbdbd; opacity: .7; }
    .alert-type { font-weight: 800; font-size: 0.88rem; }
    .alert-time { font-size: 0.76rem; color: var(--muted); }
    .no-data { text-align: center; padding: 30px; color: var(--muted); font-style: italic; }
    /* Devices */
    .device-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .device-row:last-child { border-bottom: none; }
    .device-id   { font-size: 0.82rem; font-weight: 700; color: var(--ink); font-family: monospace; }
    .device-label { font-size: 0.8rem; color: var(--muted); }
    .battery-pct  { font-size: 0.82rem; color: var(--muted); }
    @media (max-width: 600px) { main { padding: 16px; } .current-val { font-size: 2.5rem; } .chart-wrap { height: 200px; } }
  </style>
</head>
<body data-module="tempmon">
<main>
  <a href="/tempmon/" class="back-link">← Back to Dashboard</a>
  <h1 class="page-title" id="unitName">Loading…</h1>
  <p class="page-sub"  id="unitSub"></p>

  <!-- Current Temp + Limits -->
  <div class="section-card">
    <div class="current-temp-row">
      <div>
        <div class="current-lbl">Current Temperature</div>
        <div class="current-val" id="currentTemp">—</div>
      </div>
      <div>
        <div class="limits-row" id="limitsRow"></div>
        <div id="lastSeen" style="font-size:0.78rem;color:var(--muted);margin-top:6px"></div>
      </div>
    </div>
    <div style="margin-top:4px" id="openAlertsInline"></div>
  </div>

  <!-- Chart -->
  <div class="section-card">
    <h2>📈 Temperature History</h2>
    <div class="date-controls">
      <label>From <input type="date" id="fromDate"></label>
      <label>To   <input type="date" id="toDate"></label>
      <button class="btn btn-primary btn-sm" onclick="loadChart()">Apply</button>
      <a id="exportBtn" href="#" class="btn btn-outline btn-sm" style="margin-left:auto" onclick="exportCSV(event)">⬇️ Export CSV</a>
    </div>
    <div class="chart-wrap"><canvas id="tempChart"></canvas></div>
  </div>

  <!-- Alerts -->
  <div class="section-card">
    <h2 style="justify-content:space-between">
      <span>⚠️ Alerts</span>
      <a href="/tempmon/alerts.html" class="btn btn-outline btn-sm">View All →</a>
    </h2>
    <div class="alerts-list" id="alertsList"><div class="no-data">Loading…</div></div>
  </div>

  <!-- Readings Table -->
  <div class="section-card">
    <h2>📋 Recent Readings</h2>
    <div style="overflow-x:auto">
      <table class="readings-table"><thead>
        <tr><th>Timestamp</th><th>Device</th><th>Temp (°C)</th><th>Status</th></tr>
      </thead><tbody id="readingsBody">
        <tr><td colspan="4" class="no-data">Loading…</td></tr>
      </tbody></table>
    </div>
  </div>

  <!-- Devices -->
  <div class="section-card">
    <h2>📡 Devices</h2>
    <div id="devicesList"><div class="no-data">Loading…</div></div>
  </div>
</main>

<script>
  const API   = '/api/tempmon';
  const unitId = new URLSearchParams(location.search).get('id');
  let unit     = null;
  let chartInst = null;

  if (!unitId) { alert('No unit ID specified.'); location.href = '/tempmon/'; }

  // Default date range: last 24 h
  (function () {
    const now  = new Date();
    const from = new Date(now - 24 * 60 * 60 * 1000);
    document.getElementById('fromDate').value = from.toISOString().slice(0, 10);
    document.getElementById('toDate').value   = now.toISOString().slice(0, 10);
  })();

  async function init() {
    try {
      const r = await apiFetch('/api/auth/me');
      const { user } = await r.json();
      if (!user.permissions?.tempmon && user.role !== 'admin')
        return window.location.replace('/?access=denied');
      document.documentElement.style.visibility = '';
      await Promise.all([loadUnit(), loadAlerts(), loadDevices()]);
      loadChart();
    } catch { window.location.replace('/login'); }
  }

  async function loadUnit() {
    const r = await apiFetch(API + '/units/' + unitId);
    unit = await r.json();
    document.title   = unit.name + ' — Temp Monitor';
    document.getElementById('unitName').textContent = unit.name;
    document.getElementById('unitSub').textContent  =
      [unit.type.charAt(0).toUpperCase() + unit.type.slice(1), unit.location].filter(Boolean).join(' · ');

    const limitsHtml = `
      <span class="limit-badge min">Min ${unit.criticalMin}°C</span>
      <span class="limit-badge max">Max ${unit.criticalMax}°C</span>
      ${unit.targetTemp != null ? `<span class="limit-badge tgt">Target ${unit.targetTemp}°C</span>` : ''}`;
    document.getElementById('limitsRow').innerHTML = limitsHtml;

    // Latest reading via readings endpoint
    const rr = await apiFetch(API + '/readings/' + unitId + '?limit=1');
    const readings = await rr.json();
    if (readings.length) {
      const latest = readings[readings.length - 1];
      const val = latest.value;
      const cls = latest.flagged ? 'temp-critical'
                : (val < unit.criticalMin + unit.warningBuffer || val > unit.criticalMax - unit.warningBuffer)
                  ? 'temp-warning' : 'temp-in-range';
      document.getElementById('currentTemp').textContent = val.toFixed(1) + '°C';
      document.getElementById('currentTemp').className  = 'current-val ' + cls;
      document.getElementById('lastSeen').textContent   = 'Last reading: ' + new Date(latest.recordedAt).toLocaleString();
    } else {
      document.getElementById('currentTemp').textContent = 'No data';
    }
  }

  async function loadChart() {
    const from  = document.getElementById('fromDate').value;
    const to    = document.getElementById('toDate').value;
    const toEnd = to ? to + 'T23:59:59' : '';
    const url   = API + '/readings/' + unitId + '?limit=1000' + (from ? '&from=' + from : '') + (toEnd ? '&to=' + toEnd : '');
    const r = await apiFetch(url);
    const readings = await r.json();

    const labels = readings.map(r => new Date(r.recordedAt).toLocaleString('en-MY', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }));
    const data   = readings.map(r => r.value);
    const colors = readings.map(r => r.flagged ? 'rgba(198,40,40,0.8)' : 'rgba(39,174,96,0.8)');

    if (chartInst) chartInst.destroy();
    const ctx = document.getElementById('tempChart').getContext('2d');
    chartInst = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Temperature (°C)',
          data,
          borderColor: 'rgba(39,174,96,1)',
          backgroundColor: 'rgba(39,174,96,0.08)',
          pointBackgroundColor: colors,
          pointRadius: readings.length > 200 ? 0 : 3,
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + '°C' } }
        },
        scales: {
          y: {
            title: { display: true, text: '°C' },
            grid: { color: 'rgba(0,0,0,0.05)' }
          },
          x: {
            ticks: { maxTicksLimit: 10, maxRotation: 0 },
            grid: { display: false }
          }
        },
        annotation: unit ? {
          annotations: [
            { type: 'line', yMin: unit.criticalMin, yMax: unit.criticalMin, borderColor: '#1565c0', borderWidth: 1.5, borderDash: [4,4], label: { content: 'Min ' + unit.criticalMin + '°C', display: true, position: 'end', font: { size: 10 } } },
            { type: 'line', yMin: unit.criticalMax, yMax: unit.criticalMax, borderColor: '#c62828', borderWidth: 1.5, borderDash: [4,4], label: { content: 'Max ' + unit.criticalMax + '°C', display: true, position: 'end', font: { size: 10 } } }
          ]
        } : {}
      }
    });

    // Readings table (latest 50)
    const recent = readings.slice(-50).reverse();
    document.getElementById('readingsBody').innerHTML = recent.length
      ? recent.map(rd => `
          <tr class="${rd.flagged ? 'flagged-row' : ''}">
            <td>${new Date(rd.recordedAt).toLocaleString()}</td>
            <td>—</td>
            <td style="font-weight:700">${rd.value.toFixed(1)}°C</td>
            <td>${rd.flagged ? '<span class="flag">⚠️ Out of range</span>' : '✅'} ${rd.isSample ? '<span class="sample-tag">(sample)</span>' : ''}</td>
          </tr>`).join('')
      : '<tr><td colspan="4" class="no-data">No readings in selected range</td></tr>';
  }

  async function loadAlerts() {
    const r = await apiFetch(API + '/alerts?unitId=' + unitId + '&limit=10');
    const alerts = await r.json();
    document.getElementById('alertsList').innerHTML = alerts.length
      ? alerts.map(a => {
          const statusCls = a.status === 'open' ? 'open' : a.status === 'acknowledged' ? 'acked' : 'done';
          const emoji = a.type.startsWith('critical') ? '🔴' : a.type === 'device_offline' ? '⚫' : '🟡';
          const typeLabel = a.type.replace(/_/g, ' ').toUpperCase();
          return `<div class="alert-item ${statusCls}">
            <div style="flex:1">
              <div class="alert-type">${emoji} ${typeLabel} ${a.value != null ? '— ' + a.value.toFixed(1) + '°C' : ''}</div>
              <div class="alert-time">${new Date(a.createdAt).toLocaleString()} · <strong>${a.status.toUpperCase()}</strong></div>
              ${a.correctiveAction ? '<div style="font-size:0.77rem;color:#2e7d32;margin-top:3px">✅ Corrective action logged</div>' : ''}
            </div>
            ${a.status !== 'resolved' ? `<a href="/tempmon/alerts.html#${a._id}" class="btn btn-outline btn-sm">Manage</a>` : ''}
          </div>`;
        }).join('')
      : '<div class="no-data">No alerts for this unit</div>';
  }

  async function loadDevices() {
    const r = await apiFetch(API + '/units/' + unitId);
    const data = await r.json();
    const devices = data.devices || [];
    document.getElementById('devicesList').innerHTML = devices.length
      ? devices.map(d => `
          <div class="device-row">
            <div>
              <div class="device-id">${escHtml(d.deviceId)}</div>
              <div class="device-label">${escHtml(d.label || 'No label')}</div>
            </div>
            <div class="battery-pct">
              ${d.batteryPct != null ? '🔋 ' + d.batteryPct + '%' : '—'}
              <br><span style="font-size:0.72rem">${d.lastSeenAt ? 'Last: ' + new Date(d.lastSeenAt).toLocaleString() : 'Never seen'}</span>
            </div>
          </div>`).join('')
      : '<div class="no-data">No devices registered for this unit. <a href="/tempmon/setup.html" style="color:var(--accent)">Register a device →</a></div>';
  }

  function exportCSV(e) {
    e.preventDefault();
    const from  = document.getElementById('fromDate').value;
    const toEnd = document.getElementById('toDate').value ? document.getElementById('toDate').value + 'T23:59:59' : '';
    const url   = API + '/readings/' + unitId + '/export' + '?from=' + from + '&to=' + toEnd;
    window.location = url;
  }

  init();
</script>
<script src="/js/shell.js"></script>
</body>
</html>
