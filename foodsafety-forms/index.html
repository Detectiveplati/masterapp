<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.style.visibility='hidden'</script><script src="/auth-guard.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Safety Forms</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .module-grid {
      max-width: 860px;
      margin: 0 auto;
    }
    .module-card .card-icon {
      color: #344054;
    }
    .module-card .card-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      stroke: currentColor;
    }
    .card-go {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .card-go .arrow {
      width: 14px;
      height: 14px;
    }
    @media (max-width: 600px) { .module-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-module="foodsafetyforms">
  <main>
    <div class="module-grid">
      <a class="module-card workspace" href="/foodsafety-forms/forms">
        <div class="card-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 10h18"/></svg></div>
        <h2>Forms Workspace</h2>
        <p>Open assigned or available food safety forms by month, location, and form type.</p>
        <div class="card-go">Open Forms Workspace <span class="arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></span></div>
      </a>
      <a class="module-card reports" href="/foodsafety-forms/reports">
        <div class="card-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h7l5 5v13H9z"/><path d="M16 3v5h5"/><path d="M12 13h5"/><path d="M12 17h5"/><path d="M12 9h1"/><path d="M5 7H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-1"/></svg></div>
        <h2>Reports Dashboard</h2>
        <p>Review submitted forms, open archived PDFs, monitor due items, and verify completed reports.</p>
        <div class="card-go">Open Reports Dashboard <span class="arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></span></div>
      </a>
    </div>
  </main>

  <script src="/foodsafety/js/foodsafety-i18n.js"></script>
  <script src="/js/shell.js"></script>
</body>
</html>
