<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.style.visibility='hidden'</script><script src="/auth-guard.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Alerts — Temp Monitor</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/lib/dom.js"></script>
  <script src="/js/lib/http.js"></script>
  <style>
    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .nav-links { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
    .nav-link { padding: 8px 14px; border-radius: 8px; background: #f0f0f0; color: var(--muted); font-size: 0.82rem; font-weight: 700; text-decoration: none; transition: background .15s; }
    .nav-link:hover { background: #e0e0e0; color: var(--ink); }
    .nav-link.active { background: var(--accent); color: #fff; }
    .section-card { background: linear-gradient(180deg, var(--card), #fffbf9); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 2px 6px var(--shadow); padding: 22px 24px; margin-bottom: 22px; }
    .section-card h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
    .filter-bar select, .filter-bar input[type=date] { padding: 7px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; font-family: inherit; background: #fff; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2, #27ae60)); color: #fff; }
    .btn-outline  { background: #fff; border: 2px solid var(--accent); color: var(--accent); }
    .btn-sm       { padding: 5px 11px; font-size: 0.78rem; }
    .btn-danger   { background: rgba(198,40,40,.08); border: 1px solid rgba(198,40,40,.2); color: #c62828; }
    .btn-green    { background: rgba(46,125,50,.08);  border: 1px solid rgba(46,125,50,.2);  color: #2e7d32; }
    /* Alert rows */
    .alert-row { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; background: #fff; }
    .alert-row.critical-high, .alert-row.critical-low { border-left: 4px solid #c62828; }
    .alert-row.warning-high, .alert-row.warning-low   { border-left: 4px solid #e65100; }
    .alert-row.device-offline                          { border-left: 4px solid #9e9e9e; }
    .alert-row.resolved                                { opacity: .6; }
    .alert-top   { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .alert-title { font-weight: 800; font-size: 0.95rem; color: var(--ink); }
    .alert-meta  { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .alert-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge-status { display: inline-block; border-radius: 20px; padding: 2px 9px; font-size: 0.72rem; font-weight: 700; }
    .badge-open  { background: rgba(198,40,40,.12); color: #c62828; }
    .badge-acked { background: rgba(230,81,0,.12);   color: #e65100; }
    .badge-done  { background: rgba(90,97,108,.12);  color: var(--muted); }
    .ca-box { background: rgba(39,174,96,.06); border: 1px solid rgba(39,174,96,.2); border-radius: 8px; padding: 9px 14px; margin-top: 10px; font-size: 0.82rem; color: #2e7d32; }
    .no-data { text-align: center; padding: 40px; color: var(--muted); font-style: italic; }
    /* CA Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 9000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px 24px; width: min(96vw, 560px); box-shadow: 0 8px 40px rgba(0,0,0,.22); max-height: 90vh; overflow-y: auto; }
    .modal-box h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 18px; color: var(--ink); }
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--ink); margin-bottom: 5px; }
    .fg input, .fg select, .fg textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box; }
    .fg textarea { resize: vertical; min-height: 68px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .print-header { display: none; }
    @media print {
      .nav-links, .filter-bar, .alert-actions, .modal-overlay { display: none !important; }
      .print-header { display: block; margin-bottom: 20px; }
      body.print .nav-links { display: none; }
    }
    @media (max-width: 600px) { main { padding: 16px; } }
  </style>
</head>
<body data-module="tempmon">
<main>
  <div class="print-header"><h2>🌡️ Temp Monitor — Alert & Corrective Action Log</h2><p id="printSubtitle"></p></div>

  <div class="nav-links">
    <a href="/tempmon/" class="nav-link">📡 Live Dashboard</a>
    <a href="/tempmon/alerts.html" class="nav-link active">🔴 Alerts</a>
    <a href="/tempmon/report.html" class="nav-link">📊 Compliance Report</a>
    <a href="/tempmon/calibration.html" class="nav-link">🔧 Calibration</a>
    <a href="/tempmon/setup.html" class="nav-link">⚙️ Setup</a>
  </div>

  <div class="section-card">
    <h2>🔴 Alert Management</h2>

    <div class="filter-bar">
      <select id="filterStatus" onchange="load()">
        <option value="">All Statuses</option>
        <option value="open" selected>Open</option>
        <option value="acknowledged">Acknowledged</option>
        <option value="resolved">Resolved</option>
      </select>
      <select id="filterUnit" onchange="load()">
        <option value="">All Units</option>
      </select>
      <input type="date" id="filterFrom" onchange="load()" title="From date">
      <input type="date" id="filterTo"   onchange="load()" title="To date">
      <button class="btn btn-outline btn-sm" onclick="printPDF()">🖨️ Print Report</button>
    </div>

    <div id="alertsList"><div class="no-data">Loading…</div></div>
  </div>
</main>

<!-- CA Modal -->
<div class="modal-overlay" id="caModal" onclick="if(event.target===this)closeCA()">
  <div class="modal-box">
    <h3>📋 Log Corrective Action</h3>
    <div id="caAlertInfo" style="background:#fff3e0;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:0.85rem;color:#e65100;font-weight:700"></div>
    <input type="hidden" id="caAlertId">
    <div class="fg"><label>Action Taken <span style="color:#c62828">*</span></label><textarea id="caActionTaken" placeholder="Describe what was done to correct the issue…" required></textarea></div>
    <div class="fg"><label>Taken By <span style="color:#c62828">*</span></label><input type="text" id="caTakenBy" placeholder="Your name"></div>
    <div class="fg"><label>Root Cause</label><textarea id="caRootCause" placeholder="What caused this temperature excursion?"></textarea></div>
    <div class="fg"><label>Preventive Measure</label><textarea id="caPreventive" placeholder="What will prevent recurrence?"></textarea></div>
    <div class="fg"><label>Outcome</label>
      <select id="caOutcome">
        <option value="">Select outcome…</option>
        <option value="product_safe">Product confirmed safe</option>
        <option value="product_discarded">Product discarded</option>
        <option value="equipment_repaired">Equipment repaired</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="fg" style="display:flex;align-items:center;gap:10px">
      <input type="checkbox" id="caDisposal" style="width:18px;height:18px" onchange="document.getElementById('caDisposalDetails').closest('div').style.display=this.checked?'block':'none'">
      <label style="margin:0;display:inline">Product disposal required</label>
    </div>
    <div class="fg" style="display:none" id="caDisposalWrap"><label>Disposal Details</label><textarea id="caDisposalDetails" placeholder="Describe what product was disposed of…"></textarea></div>
    <div id="caErr" style="color:#c62828;font-size:0.82rem;display:none;margin-top:8px"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeCA()">Cancel</button>
      <button class="btn btn-primary" id="caSaveBtn" onclick="saveCA()">Save Corrective Action</button>
    </div>
  </div>
</div>

<script>
  const API = '/api/tempmon';
  let currentUser = null;
  let units = [];

  async function init() {
    try {
      const r = await apiFetch('/api/auth/me');
      const { user } = await r.json();
      if (!user.permissions?.tempmon && user.role !== 'admin')
        return window.location.replace('/?access=denied');
      currentUser = user;
      document.documentElement.style.visibility = '';

      // Load units for filter dropdown
      const ur = await apiFetch(API + '/units');
      units = await ur.json();
      const sel = document.getElementById('filterUnit');
      units.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u._id; opt.textContent = u.name;
        sel.appendChild(opt);
      });

      // Hash-jump: if URL has #alertId, switch filter to all so it shows up
      if (location.hash.length > 1) document.getElementById('filterStatus').value = '';

      load();
    } catch { window.location.replace('/login'); }
  }

  async function load() {
    const status = document.getElementById('filterStatus').value;
    const unitId = document.getElementById('filterUnit').value;
    const from   = document.getElementById('filterFrom').value;
    const to     = document.getElementById('filterTo').value;
    const params = new URLSearchParams({ limit: 200 });
    if (status) params.set('status', status);
    if (unitId) params.set('unitId', unitId);
    if (from)   params.set('from', from);
    if (to)     params.set('to', to + 'T23:59:59');

    const r = await apiFetch(API + '/alerts?' + params.toString());
    const alerts = await r.json();
    renderAlerts(alerts);
  }

  const TYPE_EMOJI  = { critical_high: '🔴', critical_low: '🔴', warning_high: '🟡', warning_low: '🟡', device_offline: '⚫' };
  const TYPE_LABEL  = { critical_high: 'CRITICAL HIGH', critical_low: 'CRITICAL LOW', warning_high: 'WARNING HIGH', warning_low: 'WARNING LOW', device_offline: 'DEVICE OFFLINE' };
  const STATUS_CLS  = { open: 'badge-open', acknowledged: 'badge-acked', resolved: 'badge-done' };

  function renderAlerts(alerts) {
    if (!alerts.length) {
      document.getElementById('alertsList').innerHTML = '<div class="no-data">No alerts match the current filters.</div>';
      return;
    }
    document.getElementById('alertsList').innerHTML = alerts.map(a => {
      const emoji  = TYPE_EMOJI[a.type]  || '❓';
      const label  = TYPE_LABEL[a.type]  || a.type;
      const sCls   = STATUS_CLS[a.status] || 'badge-done';
      const unitName = a.unit?.name || '—';
      const valStr   = a.value != null ? ` — ${a.value.toFixed(1)}°C` : '';
      const caBox    = a.correctiveAction
        ? `<div class="ca-box">✅ Corrective action logged by <strong>${escHtml(a.correctiveAction.takenBy)}</strong> on ${new Date(a.correctiveAction.takenAt).toLocaleDateString()} · Outcome: <strong>${escHtml(a.correctiveAction.outcome || 'N/A')}</strong></div>`
        : '';

      const actions = [];
      if (a.status === 'open')   actions.push(`<button class="btn btn-sm btn-danger" onclick="acknowledge('${a._id}')">👁️ Acknowledge</button>`);
      if (a.status !== 'resolved') actions.push(`<button class="btn btn-sm btn-green"  onclick="resolve('${a._id}')">✅ Resolve</button>`);
      if (!a.correctiveAction && a.status !== 'open')
        actions.push(`<button class="btn btn-sm btn-primary" onclick="openCA('${a._id}', '${escHtml(label + valStr)}')">📋 Log CA</button>`);
      if (a.status === 'open')
        actions.push(`<button class="btn btn-sm btn-primary" onclick="openCA('${a._id}', '${escHtml(label + valStr)}')">📋 Log CA</button>`);

      return `<div class="alert-row ${a.type.replace(/_/g,'-')} ${a.status === 'resolved' ? 'resolved' : ''}" id="alert-${a._id}">
        <div class="alert-top">
          <div>
            <div class="alert-title">${emoji} ${label}${valStr} · ${escHtml(unitName)}</div>
            <div class="alert-meta">
              ${new Date(a.createdAt).toLocaleString()}
              ${a.device ? '· Device: ' + escHtml(a.device.label || a.device.deviceId) : ''}
              · <span class="badge-status ${sCls}">${a.status.toUpperCase()}</span>
              ${a.acknowledgedBy ? `· Acked by ${escHtml(a.acknowledgedBy)}` : ''}
              ${a.resolvedBy     ? `· Resolved by ${escHtml(a.resolvedBy)}`   : ''}
            </div>
          </div>
          <div class="alert-actions">${actions.join('')}</div>
        </div>
        ${caBox}
      </div>`;
    }).join('');

    // Scroll to anchor if present
    if (location.hash) {
      const id = location.hash.substring(1);
      const el = document.getElementById('alert-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  async function acknowledge(id) {
    const name = currentUser?.displayName || prompt('Your name:') || '';
    await apiFetch(API + '/alerts/' + id + '/acknowledge', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ acknowledgedBy: name }) });
    load();
  }

  async function resolve(id) {
    const name = currentUser?.displayName || prompt('Your name:') || '';
    const note = prompt('Resolution note (optional):') || '';
    await apiFetch(API + '/alerts/' + id + '/resolve', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ resolvedBy: name, resolveNote: note }) });
    load();
  }

  // ── CA Modal ─────────────────────────────────────────────────────
  function openCA(alertId, alertLabel) {
    document.getElementById('caAlertId').value  = alertId;
    document.getElementById('caAlertInfo').textContent = 'Alert: ' + alertLabel;
    document.getElementById('caActionTaken').value = '';
    document.getElementById('caTakenBy').value     = currentUser?.displayName || '';
    document.getElementById('caRootCause').value   = '';
    document.getElementById('caPreventive').value  = '';
    document.getElementById('caOutcome').value     = '';
    document.getElementById('caDisposal').checked  = false;
    document.getElementById('caDisposalWrap').style.display = 'none';
    document.getElementById('caDisposalDetails').value = '';
    document.getElementById('caErr').style.display = 'none';
    document.getElementById('caModal').classList.add('open');
  }
  function closeCA() { document.getElementById('caModal').classList.remove('open'); }

  async function saveCA() {
    const alertId    = document.getElementById('caAlertId').value;
    const actionTaken = document.getElementById('caActionTaken').value.trim();
    const takenBy     = document.getElementById('caTakenBy').value.trim();
    if (!actionTaken || !takenBy) {
      document.getElementById('caErr').textContent = 'Action Taken and Taken By are required.';
      document.getElementById('caErr').style.display = 'block';
      return;
    }
    document.getElementById('caSaveBtn').disabled = true;
    try {
      const r = await apiFetch(API + '/corrective-actions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          alert:                   alertId,
          actionTaken,
          takenBy,
          rootCause:               document.getElementById('caRootCause').value.trim(),
          preventiveMeasure:       document.getElementById('caPreventive').value.trim(),
          outcome:                 document.getElementById('caOutcome').value,
          productDisposalRequired: document.getElementById('caDisposal').checked,
          productDisposalDetails:  document.getElementById('caDisposalDetails').value.trim()
        })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.error); }
      closeCA();
      load();
    } catch (err) {
      document.getElementById('caErr').textContent = err.message;
      document.getElementById('caErr').style.display = 'block';
    } finally {
      document.getElementById('caSaveBtn').disabled = false;
    }
  }

  function printPDF() {
    document.getElementById('printSubtitle').textContent = 'Alert & CA Log · Generated ' + new Date().toLocaleString();
    document.body.classList.add('print');
    window.print();
    window.addEventListener('afterprint', () => document.body.classList.remove('print'), { once: true });
  }

  init();
</script>
<script src="/js/shell.js"></script>
</body>
</html>
